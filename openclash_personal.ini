[custom]
; Personal OpenClash / subconverter remote config.
; Keep this file free of private service endpoints, node definitions, and credentials.

; 局域网永远直连，必须放最前，避免 iPhone 访问 NAS / Mac Studio / 路由器也被代理。
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/LocalAreaNetwork.list

; iPhone 192.168.5.50 的非局域网流量走 Claude 固定家宽。
ruleset=🧠 Claude固定家宽,https://raw.githubusercontent.com/Iqaij-Uhz/my-openclash-rule/main/rules/PhoneClaude.list

; 自定义直连 / 代理 / Claude / AI / 支付。
ruleset=🎯 全球直连,https://raw.githubusercontent.com/Iqaij-Uhz/my-openclash-rule/main/rules/Direct.list
ruleset=🚀 节点选择,https://raw.githubusercontent.com/Iqaij-Uhz/my-openclash-rule/main/rules/ProxyLite.list
ruleset=🧠 Claude固定家宽,https://raw.githubusercontent.com/Iqaij-Uhz/my-openclash-rule/main/rules/Claude.list
ruleset=🤖 AI,https://raw.githubusercontent.com/Iqaij-Uhz/my-openclash-rule/main/rules/AI.list
ruleset=💳 支付服务,https://raw.githubusercontent.com/Iqaij-Uhz/my-openclash-rule/main/rules/Payment.list

; 基础放行。
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/UnBan.list

; Ad blocking templates are intentionally disabled by default.
;ruleset=🛑 广告拦截,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanAD.list
;ruleset=🍃 应用净化,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanProgramAD.list

ruleset=👨🏿‍💻 GitHub,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/GitHub/GitHub.list
ruleset=🍀 Google,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Google/Google.list
ruleset=🪟 Microsoft,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Microsoft.list
ruleset=🍎 Apple,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Apple.list
ruleset=📹 YouTube,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/YouTube.list
ruleset=📲 Telegram,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Telegram/Telegram.list

; Streaming templates are intentionally disabled by default.
;ruleset=🎥 Netflix,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Netflix.list
;ruleset=🎵 TikTok,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/TikTok/TikTok.list
;ruleset=🌍 国外媒体,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ProxyMedia.list

ruleset=🚀 节点选择,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ProxyGFWlist.list

; Low-memory mode: these large rules are disabled to reduce Clash/Mihomo memory pressure.
ruleset=🚀 节点选择,[]GEOSITE,geolocation-!cn
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaDomain.list
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaCompanyIp.list
ruleset=🎯 全球直连,[]GEOSITE,CN
ruleset=🎯 全球直连,[]GEOIP,CN
ruleset=🐟 漏网之鱼,[]FINAL

; Core policy groups.
custom_proxy_group=🚀 节点选择`select`[]🤖 AI节点`[]🔯 香港故转`[]🔯 日本故转`[]🔯 美国故转`[]🇭🇰 香港节点`[]🇯🇵 日本节点`[]🇺🇲 美国节点`[]🐸 手动切换`[]DIRECT
custom_proxy_group=🧠 Claude固定家宽`select`^vless-reality-zjq-awsvps$`[]🏡 美国家宽备用`[]🐸 手动切换
custom_proxy_group=🤖 AI`select`[]🤖 AI节点`[]🧠 Claude固定家宽`[]🏡 家宽节点`[]🏡 美国家宽备用`[]🇺🇲 美国节点`[]🐸 手动切换`[]🚀 节点选择
custom_proxy_group=💳 支付服务`select`[]DIRECT`[]🏡 美国家宽备用`[]🇺🇲 美国节点`[]🐸 手动切换
custom_proxy_group=🍀 Google`select`[]🚀 节点选择`[]🇯🇵 日本节点`[]🇭🇰 香港节点`[]🇺🇲 美国节点`[]🐸 手动切换`[]DIRECT
custom_proxy_group=👨🏿‍💻 GitHub`select`[]🚀 节点选择`[]🔯 日本故转`[]🔯 香港故转`[]🇯🇵 日本节点`[]🇭🇰 香港节点`[]🇺🇲 美国节点`[]🐸 手动切换
custom_proxy_group=🪟 Microsoft`select`[]DIRECT`[]🚀 节点选择`[]🇯🇵 日本节点`[]🇭🇰 香港节点`[]🇺🇲 美国节点`[]🐸 手动切换
custom_proxy_group=🍎 Apple`select`[]DIRECT`[]🚀 节点选择`[]🐸 手动切换
custom_proxy_group=📹 YouTube`select`[]🚀 节点选择`[]🇭🇰 香港节点`[]🇯🇵 日本节点`[]🇺🇲 美国节点`[]🐸 手动切换
custom_proxy_group=📲 Telegram`select`[]🚀 节点选择`[]🔯 香港故转`[]🔯 日本故转`[]🇭🇰 香港节点`[]🇯🇵 日本节点`[]🇺🇲 美国节点`[]🐸 手动切换
custom_proxy_group=🎯 全球直连`select`[]DIRECT`[]🚀 节点选择`[]🐸 手动切换
custom_proxy_group=🛑 广告拦截`select`[]REJECT`[]DIRECT
custom_proxy_group=🍃 应用净化`select`[]REJECT`[]DIRECT
custom_proxy_group=🐟 漏网之鱼`select`[]🧠 Claude固定家宽`[]🚀 节点选择`[]DIRECT`[]🐸 手动切换

; Node filters.
custom_proxy_group=🐸 手动切换`select`.*
custom_proxy_group=🇭🇰 香港节点`select`(香港|HK|Hong Kong)`[]🐸 手动切换
custom_proxy_group=🇯🇵 日本节点`select`(日本|JP|Japan)`[]🐸 手动切换
custom_proxy_group=🇺🇲 美国节点`select`(美国|US|United States|USA)`[]🐸 手动切换
custom_proxy_group=🏡 家宽节点`select`(家宽|家庭|Residential|residential|Home|home|ISP|原生|住宅)`[]🐸 手动切换
custom_proxy_group=🤖 AI节点`select`(AI|ChatGPT|GPT|OpenAI|Claude|Gemini|Anthropic)`[]🐸 手动切换
custom_proxy_group=🏡 美国家宽备用`select`^BGP智能路由-美国(07|08|09|10)-家宽-ss-x2$`[]🐸 手动切换
custom_proxy_group=🔯 香港故转`fallback`(香港|HK|Hong Kong)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🔯 日本故转`fallback`(日本|JP|Japan)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🔯 美国故转`fallback`(美国|US|United States|USA)`http://www.gstatic.com/generate_204`300,,50

; Streaming group templates are intentionally disabled by default.
;custom_proxy_group=🎥 Netflix`select`[]🚀 节点选择`[]🇭🇰 香港节点`[]🇯🇵 日本节点`[]🇺🇲 美国节点`[]🐸 手动切换
;custom_proxy_group=🎵 TikTok`select`[]🚀 节点选择`[]🇯🇵 日本节点`[]🇺🇲 美国节点`[]🐸 手动切换
;custom_proxy_group=🌍 国外媒体`select`[]🚀 节点选择`[]🇭🇰 香港节点`[]🇯🇵 日本节点`[]🇺🇲 美国节点`[]🐸 手动切换
;custom_proxy_group=🎥 流媒体节点`select`(NF|奈飞|解锁|Netflix|NETFLIX|Media|TikTok|Disney|Spotify)

enable_rule_generator=true
overwrite_original_rules=true
